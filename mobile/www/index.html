<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>ResTito Repartidor</title>
<style>
  html,body{height:100%;margin:0;background:#0b0716;color:#fff;font-family:-apple-system,Segoe UI,Roboto,sans-serif}
  .w{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;padding:24px}
  .logo{width:88px;height:88px;border-radius:24px;background:linear-gradient(135deg,#dc2626,#f87171);display:grid;place-items:center;font-size:44px;box-shadow:0 16px 40px rgba(220,38,38,.5)}
  .sp{width:42px;height:42px;border-radius:50%;border:4px solid rgba(255,255,255,.2);border-top-color:#f87171;animation:s 1s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  p{color:#c4b5fd;font-size:14px;max-width:280px}
  a{color:#f87171}
</style>
</head>
<body>
<!-- Pantalla de respaldo: el app carga la web real (server.url). Esto se ve solo si no hay conexión. -->
<div class="w">
  <div class="logo">🛵</div>
  <div class="sp"></div>
  <p>Conectando con ResTito…<br>Si no carga, revisá tu conexión a internet.</p>
</div>
</body>
</html>
