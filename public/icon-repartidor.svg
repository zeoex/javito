<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c1121f"/>
      <stop offset="100%" stop-color="#6b0504"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>

  <!-- Rear wheel (left side) -->
  <circle cx="148" cy="338" r="68" fill="none" stroke="white" stroke-width="18"/>
  <circle cx="148" cy="338" r="22" fill="white"/>

  <!-- Front wheel (right side) -->
  <circle cx="376" cy="338" r="68" fill="none" stroke="white" stroke-width="18"/>
  <circle cx="376" cy="338" r="22" fill="white"/>

  <!-- Scooter frame body -->
  <path d="M 148 338 L 186 228 L 268 208 L 346 246 L 376 296"
        fill="none" stroke="white" stroke-width="20"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Seat area -->
  <path d="M 186 228 L 240 186 L 295 196 L 270 228 Z"
        fill="white" opacity="0.92"/>

  <!-- Handlebars — front fork -->
  <line x1="346" y1="246" x2="390" y2="206"
        stroke="white" stroke-width="18" stroke-linecap="round"/>
  <!-- Grips -->
  <line x1="384" y1="200" x2="420" y2="220"
        stroke="white" stroke-width="14" stroke-linecap="round"/>

  <!-- Delivery bag/box -->
  <rect x="150" y="148" width="108" height="82" rx="10"
        fill="white" opacity="0.92"/>
  <!-- Box lid stripe -->
  <rect x="150" y="148" width="108" height="20" rx="10"
        fill="rgba(180,10,10,0.6)"/>
  <!-- Logo dot on box -->
  <circle cx="204" cy="198" r="12" fill="rgba(180,10,10,0.7)"/>

  <!-- Motion lines (speed) -->
  <line x1="38" y1="252" x2="105" y2="252"
        stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.50"/>
  <line x1="18" y1="282" x2="95" y2="282"
        stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
  <line x1="52" y1="314" x2="108" y2="314"
        stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.25"/>

  <!-- Label -->
  <text x="256" y="474" font-size="32" font-weight="700"
        text-anchor="middle" fill="rgba(255,255,255,0.58)"
        font-family="Arial,sans-serif" letter-spacing="6">DELIVERY</text>
</svg>
