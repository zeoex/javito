<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e63946"/>
      <stop offset="100%" stop-color="#9d0208"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Scooter body -->
  <!-- Rear wheel -->
  <circle cx="130" cy="340" r="70" fill="none" stroke="white" stroke-width="22"/>
  <circle cx="130" cy="340" r="20" fill="white"/>
  <!-- Front wheel -->
  <circle cx="390" cy="340" r="55" fill="none" stroke="white" stroke-width="22"/>
  <circle cx="390" cy="340" r="16" fill="white"/>
  <!-- Frame body -->
  <path d="M130 340 L180 220 L280 200 L360 240 L390 290" fill="none" stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Seat/body -->
  <path d="M180 220 L250 180 L300 190 L280 220 Z" fill="white"/>
  <!-- Handlebars -->
  <line x1="360" y1="240" x2="400" y2="200" stroke="white" stroke-width="18" stroke-linecap="round"/>
  <line x1="395" y1="195" x2="430" y2="215" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <!-- Delivery box on back -->
  <rect x="155" y="155" width="95" height="75" rx="10" fill="white" opacity=".9"/>
  <line x1="155" y1="192" x2="250" y2="192" stroke="#e63946" stroke-width="6"/>
  <!-- Speed lines -->
  <line x1="40" y1="260" x2="95" y2="260" stroke="white" stroke-width="10" stroke-linecap="round" opacity=".5"/>
  <line x1="20" y1="290" x2="85" y2="290" stroke="white" stroke-width="8" stroke-linecap="round" opacity=".35"/>
  <!-- Label -->
  <text x="256" y="464" font-size="46" font-weight="700" text-anchor="middle" fill="white" font-family="Arial,sans-serif" opacity=".9">DELIVERY</text>
</svg>
