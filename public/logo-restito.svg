<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 96" width="320" height="96">

  <!-- Left side: Circular emblem -->
  <!-- Circle ring -->
  <circle cx="38" cy="48" r="34" fill="none" stroke="#1d3557" stroke-width="3"/>

  <!-- Fork — 3 tines -->
  <rect x="20" y="22" width="4" height="22" rx="2" fill="#1d3557"/>
  <rect x="27" y="22" width="4" height="22" rx="2" fill="#1d3557"/>
  <rect x="34" y="22" width="4" height="22" rx="2" fill="#1d3557"/>
  <!-- Fork handle -->
  <rect x="25" y="42" width="8" height="26" rx="4" fill="#1d3557"/>

  <!-- Knife — blade -->
  <path d="M 46 22 Q 52 22 52 36 L 46 38 Z" fill="#1d3557"/>
  <!-- Knife — handle -->
  <rect x="44" y="22" width="5" height="48" rx="2.5" fill="#1d3557"/>

  <!-- Divider line -->
  <line x1="86" y1="16" x2="86" y2="80" stroke="#dee2e6" stroke-width="1.5"/>

  <!-- Right side: Wordmark -->
  <!-- "Res" thin weight -->
  <text x="100" y="58" font-size="38" font-weight="300"
        fill="#1d3557" font-family="Arial,sans-serif">Res</text>
  <!-- "Tito" bold weight -->
  <text x="172" y="58" font-size="38" font-weight="800"
        fill="#e63946" font-family="Arial,sans-serif">Tito</text>

  <!-- Tagline -->
  <text x="100" y="76" font-size="11" font-weight="400"
        fill="#6c757d" font-family="Arial,sans-serif"
        letter-spacing="2.5">SISTEMA POS</text>

</svg>
