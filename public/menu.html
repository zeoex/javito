<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Carta QR – ResTito</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#0f0f0f;color:#fff;min-height:100vh}
.hero{background:linear-gradient(135deg,#c0392b,#e74c3c);padding:40px 20px;text-align:center}
.hero-logo{max-height:70px;max-width:160px;object-fit:contain;margin-bottom:12px;display:none}
.hero-emoji{font-size:64px;display:block;margin-bottom:16px}
.hero h1{font-size:32px;font-weight:900;margin-bottom:8px}
.hero p{color:rgba(255,255,255,0.8);font-size:15px}
.container{max-width:800px;margin:0 auto;padding:24px 16px}
.cat-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #222}
.cat-btn{padding:8px 16px;border-radius:20px;border:1.5px solid #333;background:transparent;color:#aaa;font-size:13px;cursor:pointer;transition:all .15s;font-family:inherit}
.cat-btn.active,.cat-btn:hover{background:#e74c3c;border-color:#e74c3c;color:#fff}
.cat-section{margin-bottom:32px}
.cat-title{font-size:18px;font-weight:800;color:#e74c3c;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.item-card{background:#1a1a1a;border:1.5px solid #222;border-radius:14px;padding:16px;transition:all .15s}
.item-card:hover{border-color:#e74c3c;transform:translateY(-2px)}
.item-emoji{font-size:36px;margin-bottom:10px;display:block}
.item-name{font-size:15px;font-weight:700;margin-bottom:4px}
.item-desc{font-size:12px;color:#666;margin-bottom:10px;line-height:1.4}
.item-price{font-size:13px;font-weight:600;color:#e74c3c}
.item-price span{display:block}
.back-link{display:inline-flex;align-items:center;gap:6px;color:#666;font-size:13px;text-decoration:none;margin-bottom:20px}
.back-link:hover{color:#e74c3c}
.empty{text-align:center;padding:40px;color:#555}
</style>
</head>
<body>
<div class="hero">
  <img class="hero-logo" id="heroLogo" src="" alt="logo"/>
  <span class="hero-emoji" id="heroEmoji">🍕</span>
  <h1 id="heroNombre">ResTito</h1>
  <p id="heroDir"></p>
</div>

<div class="container">
  <a href="/portal.html" class="back-link">← Volver al portal</a>
  <div class="cat-filter" id="catFilter"></div>
  <div id="menuContent"><div class="empty">Cargando carta...</div></div>
</div>

<script>
let MENU = [];
let activeCat = 'Todos';
let allCats = ['Todos'];

function applyBizConfig(biz) {
  if (biz.nombre) document.getElementById('heroNombre').textContent = biz.nombre;
  if (biz.logo) {
    document.getElementById('heroLogo').src = biz.logo;
    document.getElementById('heroLogo').style.display = 'block';
    document.getElementById('heroEmoji').style.display = 'none';
  }
  const dirParts = [biz.dir, biz.tel].filter(Boolean);
  if (dirParts.length) document.getElementById('heroDir').textContent = dirParts.join(' · ');
}

async function loadMenu() {
  try {
    const saved = localStorage.getItem('pz_biz_cfg');
    if (saved) applyBizConfig(JSON.parse(saved));
  } catch(e) {}
  try {
    const res = await fetch('/api/state');
    const state = await res.json();
    const biz = state.biz_config || {};
    applyBizConfig(biz);
    const productos = (state.productos || []).filter(p => p.activo !== false && p.en_carta_qr !== false);
    const categorias = state.categorias || [];
    const groups = {};
    for (const p of productos) {
      if (!groups[p.categoria]) groups[p.categoria] = [];
      groups[p.categoria].push(p);
    }
    MENU = [];
    for (const cat of categorias) {
      if (groups[cat.id] && groups[cat.id].length) {
        MENU.push({
          cat: cat.id,
          label: `${cat.emoji} ${cat.nombre}`,
          items: groups[cat.id].map(p => ({
            id: p.id,
            emoji: p.emoji || '🍽️',
            foto: p.foto || null,
            nombre: p.nombre,
            desc: p.descripcion || '',
            ...(p.precio_chica ? {precios:{Chica:p.precio_chica,Mediana:p.precio_mediana,Grande:p.precio_grande}} : {precio:p.precio})
          }))
        });
      }
    }
    for (const [catId, items] of Object.entries(groups)) {
      if (!categorias.find(c => c.id === catId)) {
        MENU.push({
          cat: catId,
          label: catId,
          items: items.map(p => ({
            id: p.id,
            emoji: p.emoji || '🍽️',
            foto: p.foto || null,
            nombre: p.nombre,
            desc: p.descripcion || '',
            ...(p.precio_chica ? {precios:{Chica:p.precio_chica,Mediana:p.precio_mediana,Grande:p.precio_grande}} : {precio:p.precio})
          }))
        });
      }
    }
  } catch(e) {
    MENU = [];
  }
  allCats = ['Todos', ...MENU.map(s => s.label)];
  renderFilter();
  renderMenu();
}

function renderFilter() {
  document.getElementById('catFilter').innerHTML = allCats.map(c =>
    `<button class="cat-btn${c===activeCat?' active':''}" onclick="setcat('${c.replace(/'/g,"\\'")}'">${c}</button>`
  ).join('');
}

function setcat(cat) {
  activeCat = cat;
  renderFilter();
  renderMenu();
}

function priceHTML(item) {
  if (item.precio) return `<span>$${item.precio.toLocaleString('es-AR')}</span>`;
  return Object.entries(item.precios).map(([k,v]) => `<span>${k}: $${v.toLocaleString('es-AR')}</span>`).join('');
}

function renderMenu() {
  const sections = activeCat === 'Todos' ? MENU : MENU.filter(s => s.label === activeCat);
  if (!sections.length) {
    document.getElementById('menuContent').innerHTML = '<div class="empty">No hay productos disponibles</div>';
    return;
  }
  document.getElementById('menuContent').innerHTML = sections.map(s => `
    <div class="cat-section">
      <div class="cat-title">${s.label}</div>
      <div class="items-grid">${s.items.map(i => `
        <div class="item-card">
          ${i.foto ? `<img src="${i.foto}" style="width:100%;height:140px;object-fit:cover;border-radius:8px;margin-bottom:10px;display:block">` : `<span class="item-emoji">${i.emoji}</span>`}
          <div class="item-name">${i.nombre}</div>
          <div class="item-desc">${i.desc}</div>
          <div class="item-price">${priceHTML(i)}</div>
        </div>`).join('')}
      </div>
    </div>`).join('');
}

loadMenu();
</script>
</body>
</html>
