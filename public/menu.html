<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Carta QR</title>
<style>
/* ── DESIGN TOKENS ── */
:root{
  --bg:#06060f;
  --bg-2:#0c0c1a;
  --bg-3:#12122a;
  --surface:rgba(255,255,255,0.04);
  --surface-hover:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);
  --border-hover:rgba(255,255,255,0.18);
  --text:#f0f0ff;
  --text-2:#9090bb;
  --text-3:#5a5a80;
  --accent:#d97706;
  --accent-2:#fbbf24;
  --accent-glow:rgba(217,119,6,0.25);
  --accent-glow-strong:rgba(251,191,36,0.18);
  --price-color:#fbbf24;
  --radius-card:16px;
  --radius-pill:22px;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* ── HERO ── */
.hero{
  position:relative;
  height:220px;
  background:var(--bg-3);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:20px 20px 26px;
}

/* ── CAROUSEL SLIDES ── */
.hero-slides{position:absolute;inset:0;z-index:0}
.hero-slide{
  position:absolute;inset:0;
  background-size:cover;
  background-position:center;
  opacity:0;
  transition:opacity 1.4s ease;
  transform:scale(1.04);
  animation:none;
}
.hero-slide.active{
  opacity:1;
  animation:heroZoom 6s ease-out forwards;
}
@keyframes heroZoom{
  from{transform:scale(1.04)}
  to{transform:scale(1.00)}
}

/* ── GRADIENT OVERLAY (dramatic dark) ── */
.hero-overlay{
  position:absolute;inset:0;z-index:1;
  background:
    linear-gradient(to top,  rgba(6,6,15,0.96) 0%,  rgba(6,6,15,0.60) 40%, rgba(6,6,15,0.10) 100%),
    linear-gradient(to right, rgba(6,6,15,0.55) 0%, transparent 65%);
  pointer-events:none;
}

/* ── CAROUSEL DOTS ── */
.hero-dots{
  position:relative;z-index:3;
  display:flex;gap:6px;align-self:center;
  margin-top:16px;
}
.hero-dot{
  width:6px;height:6px;border-radius:50%;border:none;cursor:pointer;padding:0;
  background:rgba(255,255,255,0.28);
  transition:all .35s ease;
}
.hero-dot.active{
  background:var(--accent-2);
  width:22px;border-radius:3px;
  box-shadow:0 0 8px var(--accent-glow);
}

/* ── BACK BUTTON ── */
.hero-back{
  position:absolute;top:16px;left:16px;
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 14px;border-radius:var(--radius-pill);
  background:rgba(6,6,15,0.55);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.14);
  color:rgba(255,255,255,0.85);font-size:13px;font-weight:500;text-decoration:none;
  transition:background .2s,border-color .2s,color .2s;z-index:3;
  letter-spacing:0.01em;
}
.hero-back:hover{
  background:rgba(217,119,6,0.22);
  border-color:rgba(251,191,36,0.4);
  color:#fff;
}

/* ── RESTAURANT IDENTITY ── */
.hero-identity{display:flex;align-items:flex-end;gap:15px;position:relative;z-index:3}
.hero-logo-wrap{
  width:76px;height:76px;flex-shrink:0;
  background:rgba(255,255,255,0.06);
  border:1.5px solid rgba(255,255,255,0.14);
  border-radius:18px;
  box-shadow:0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(251,191,36,0.08);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.hero-logo-wrap img{width:100%;height:100%;object-fit:cover;display:none}
.hero-logo-wrap .hero-emoji-inner{font-size:36px;line-height:1}
.hero-text{flex:1;min-width:0}
.hero-text h1{
  font-size:28px;font-weight:900;color:#fff;
  letter-spacing:-.6px;line-height:1.1;margin-bottom:5px;
  text-shadow:0 2px 20px rgba(0,0,0,0.8);
}
.hero-text p{
  font-size:13px;color:rgba(255,255,255,0.62);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  text-shadow:0 1px 6px rgba(0,0,0,0.6);
  letter-spacing:0.01em;
}

/* ── CATEGORY NAV ── */
.cat-nav-wrap{
  position:sticky;top:0;z-index:100;
  background:rgba(6,6,15,0.9);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  box-shadow:0 4px 24px rgba(0,0,0,0.5);
}
.cat-nav{
  display:flex;gap:7px;
  overflow-x:auto;
  padding:10px 14px;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
}
.cat-nav::-webkit-scrollbar{display:none}

.cat-pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:7px 15px;border-radius:var(--radius-pill);
  border:1.5px solid rgba(255,255,255,0.10);
  background:rgba(255,255,255,0.05);
  color:var(--text-2);
  font-size:13px;font-weight:500;
  white-space:nowrap;cursor:pointer;
  font-family:inherit;
  transition:all .2s ease;flex-shrink:0;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.cat-pill:hover{
  border-color:rgba(251,191,36,0.35);
  color:var(--accent-2);
  background:rgba(217,119,6,0.10);
}
.cat-pill.active{
  background:linear-gradient(135deg,var(--accent),#b45309);
  border-color:transparent;
  color:#fff;font-weight:700;
  box-shadow:0 0 16px var(--accent-glow), 0 2px 8px rgba(0,0,0,0.4);
  text-shadow:0 1px 4px rgba(0,0,0,0.3);
}

/* ── MAIN CONTENT ── */
.content{max-width:760px;margin:0 auto;padding:22px 14px 48px}

/* ── SECTION HEADER ── */
.section-hdr{
  display:flex;align-items:center;gap:11px;
  margin:32px 0 14px;
}
.section-hdr:first-child{margin-top:4px}
.section-hdr-bar{
  width:4px;height:26px;border-radius:3px;flex-shrink:0;
  background:linear-gradient(to bottom, var(--accent-2), rgba(217,119,6,0.2));
  box-shadow:0 0 10px var(--accent-glow);
}
.section-hdr-text{
  font-size:19px;font-weight:800;letter-spacing:-.3px;
  color:var(--text);
}

/* ── PRODUCT CARDS ── */
.product-card{
  background:var(--surface);
  border-radius:var(--radius-card);
  border:1px solid var(--border);
  display:flex;align-items:stretch;
  overflow:hidden;
  margin-bottom:10px;
  transition:border-color .2s, background .2s, transform .2s, box-shadow .2s;
  min-height:92px;
  position:relative;
}
.product-card::before{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(135deg,rgba(251,191,36,0.03) 0%,transparent 60%);
  pointer-events:none;opacity:0;transition:opacity .2s;
}
.product-card:hover{
  border-color:var(--border-hover);
  background:var(--surface-hover);
  transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(0,0,0,0.4), 0 0 0 1px rgba(251,191,36,0.06);
}
.product-card:hover::before{opacity:1}
.product-card:last-child{margin-bottom:0}

.card-body{
  flex:1;padding:14px 15px;
  display:flex;flex-direction:column;justify-content:center;min-width:0;
}
.card-name{
  font-size:15px;font-weight:700;margin-bottom:4px;line-height:1.3;
  color:var(--text);
}
.card-desc{
  font-size:12px;color:var(--text-2);line-height:1.5;margin-bottom:9px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.card-price{
  font-size:17px;font-weight:900;color:var(--price-color);line-height:1;
  letter-spacing:-.2px;
  text-shadow:0 0 20px rgba(251,191,36,0.3);
}
.card-price-chips{display:grid;grid-template-columns:repeat(auto-fit,minmax(0,1fr));gap:5px;margin-top:3px;width:100%}
.price-chip{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(217,119,6,0.14);
  color:var(--accent-2);
  font-size:11px;font-weight:700;
  padding:5px 4px;border-radius:10px;
  border:1px solid rgba(251,191,36,0.22);
  letter-spacing:0.01em;text-align:center;line-height:1.3;
}

.card-media{
  width:100px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg, rgba(18,18,42,0.9), rgba(12,12,26,0.95));
  position:relative;overflow:hidden;
  border-left:1px solid var(--border);
}
.card-media::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at center,rgba(217,119,6,0.07) 0%,transparent 70%);
  pointer-events:none;
}
.card-media img{width:100%;height:100%;object-fit:cover;display:none}
.card-media .card-emoji{font-size:40px;line-height:1;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.5))}

/* ── LOADING ── */
.loading{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:70px 20px;gap:16px;color:var(--text-3);font-size:14px;
}
.spinner{
  width:36px;height:36px;
  border:2.5px solid rgba(255,255,255,0.08);
  border-top-color:var(--accent-2);
  border-radius:50%;
  animation:spin .8s linear infinite;
  box-shadow:0 0 16px var(--accent-glow);
}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{
  text-align:center;padding:70px 20px;
  color:var(--text-3);font-size:14px;
}

/* ── FOOTER ── */
.footer{
  text-align:center;padding:22px 20px;
  font-size:12px;color:var(--text-3);
  border-top:1px solid var(--border);
  background:var(--bg-2);
  margin-top:20px;
  letter-spacing:0.02em;
}
.footer strong{color:var(--text-2)}

/* ── DESKTOP ── */
@media(min-width:600px){
  .hero{height:260px;padding:20px 36px 28px}
  .hero-back{top:24px;left:28px}
  .hero-text h1{font-size:38px}
  .hero-logo-wrap{width:88px;height:88px}
  .hero-logo-wrap .hero-emoji-inner{font-size:44px}
  .content{padding:28px 28px 64px}
  .card-media{width:112px}
  .section-hdr{margin:36px 0 16px}
}
</style>
</head>
<body>

<div class="hero">
  <!-- Carousel background -->
  <div class="hero-slides" id="heroSlides">
    <div class="hero-slide" style="background-image:url('/img/food1.jpg')"></div>
    <div class="hero-slide" style="background-image:url('/img/food2.jpg')"></div>
    <div class="hero-slide" style="background-image:url('/img/food3.jpg')"></div>
    <div class="hero-slide" style="background-image:url('/img/food4.jpg')"></div>
    <div class="hero-slide" style="background-image:url('/img/food5.jpg')"></div>
  </div>
  <!-- Gradient overlay -->
  <div class="hero-overlay"></div>
  <!-- Restaurant identity -->
  <div class="hero-identity">
    <div class="hero-logo-wrap">
      <img id="heroLogo" src="" alt="logo"/>
      <span class="hero-emoji-inner" id="heroEmoji">🍕</span>
    </div>
    <div class="hero-text">
      <h1 id="heroNombre">Pizzería</h1>
      <p id="heroSub"></p>
    </div>
  </div>
  <!-- Carousel dots -->
  <div class="hero-dots" id="heroDots"></div>
</div>

<div class="cat-nav-wrap">
  <div class="cat-nav" id="catNav"></div>
</div>

<div class="content" id="menuContent">
  <div class="loading"><div class="spinner"></div>Cargando carta…</div>
</div>

<div class="footer" id="footer">
  <strong id="footerNombre">Pizzería</strong> · Carta digital
</div>

<script>
/* ── CAROUSEL ── */
(function initCarousel() {
  const slides = document.querySelectorAll('.hero-slide');
  const dotsWrap = document.getElementById('heroDots');
  let cur = 0;

  slides[0].classList.add('active');
  slides.forEach((_, i) => {
    const d = document.createElement('button');
    d.className = 'hero-dot' + (i === 0 ? ' active' : '');
    d.setAttribute('aria-label', 'Foto ' + (i + 1));
    d.onclick = () => go(i);
    dotsWrap.appendChild(d);
  });

  function go(n) {
    slides[cur].classList.remove('active');
    dotsWrap.children[cur].classList.remove('active');
    cur = n;
    slides[cur].classList.add('active');
    dotsWrap.children[cur].classList.add('active');
  }

  setInterval(() => go((cur + 1) % slides.length), 4500);
})();

let MENU = [];
let observer = null;
let scrolling = false;

function applyBizConfig(biz) {
  if (biz.nombre) {
    document.getElementById('heroNombre').textContent = biz.nombre;
    document.getElementById('footerNombre').textContent = biz.nombre;
    document.title = biz.nombre + ' – Carta';
  }
  if (biz.logo) {
    const img = document.getElementById('heroLogo');
    img.src = biz.logo;
    img.style.display = 'block';
    document.getElementById('heroEmoji').style.display = 'none';
  }
  const parts = [biz.dir, biz.tel].filter(Boolean);
  if (parts.length) document.getElementById('heroSub').textContent = parts.join(' · ');
}

function formatPrice(n) {
  return '$' + Number(n).toLocaleString('es-AR');
}

function renderCard(item) {
  const mediaContent = item.foto
    ? `<img src="${item.foto}" alt="${item.nombre}" onload="this.style.display='block'" onerror="this.style.display='none'">`
    : `<span class="card-emoji">${item.emoji}</span>`;

  let priceBlock;
  if (item.precios) {
    const chips = Object.entries(item.precios)
      .filter(([,v]) => v)
      .map(([k,v]) => `<span class="price-chip"><span style="opacity:.7;font-size:10px">${k}</span> ${formatPrice(v)}</span>`)
      .join('');
    priceBlock = `<div class="card-price-chips">${chips}</div>`;
  } else {
    priceBlock = `<div class="card-price">${formatPrice(item.precio)}</div>`;
  }

  return `
    <div class="product-card">
      <div class="card-body">
        <div class="card-name">${item.nombre}</div>
        ${item.desc ? `<div class="card-desc">${item.desc}</div>` : ''}
        ${priceBlock}
      </div>
      <div class="card-media">${mediaContent}</div>
    </div>`;
}

function renderMenu() {
  if (!MENU.length) {
    document.getElementById('menuContent').innerHTML =
      '<div class="empty-state">No hay productos disponibles en la carta.</div>';
    document.getElementById('catNav').innerHTML = '';
    return;
  }

  // Category nav
  const navHtml = MENU.map((s, i) =>
    `<button class="cat-pill${i===0?' active':''}" data-idx="${i}" onclick="scrollToSection(${i})">${s.label}</button>`
  ).join('');
  document.getElementById('catNav').innerHTML = navHtml;

  // Sections
  const sectionsHtml = MENU.map((s, i) => `
    <div class="menu-section" data-idx="${i}" id="section-${i}">
      <div class="section-hdr">
        <div class="section-hdr-bar"></div>
        <div class="section-hdr-text">${s.label}</div>
      </div>
      ${s.items.map(renderCard).join('')}
    </div>`).join('');

  document.getElementById('menuContent').innerHTML = sectionsHtml;
  setupObserver();
}

function scrollToSection(idx) {
  scrolling = true;
  setActivePill(idx);
  const el = document.getElementById('section-' + idx);
  if (el) {
    const navH = document.querySelector('.cat-nav-wrap').offsetHeight;
    const top = el.getBoundingClientRect().top + window.scrollY - navH - 8;
    window.scrollTo({top, behavior:'smooth'});
  }
  setTimeout(() => { scrolling = false; }, 700);
}

function setActivePill(idx) {
  document.querySelectorAll('.cat-pill').forEach((p, i) => {
    p.classList.toggle('active', i === idx);
  });
  // scroll pill into view
  const pill = document.querySelector(`.cat-pill[data-idx="${idx}"]`);
  if (pill) pill.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
}

function setupObserver() {
  if (observer) observer.disconnect();
  const navH = document.querySelector('.cat-nav-wrap').offsetHeight;
  observer = new IntersectionObserver(entries => {
    if (scrolling) return;
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        setActivePill(Number(entry.target.dataset.idx));
      }
    });
  }, {rootMargin: `-${navH + 4}px 0px -60% 0px`, threshold: 0});
  document.querySelectorAll('.menu-section').forEach(el => observer.observe(el));
}

async function loadMenu() {
  try {
    const saved = localStorage.getItem('pz_biz_cfg');
    if (saved) applyBizConfig(JSON.parse(saved));
  } catch(e) {}

  try {
    const res = await fetch('/api/public/menu');
    const state = await res.json();
    const biz = state.biz_cfg || state.biz_config || {};
    applyBizConfig(biz);

    const productos = (state.productos || [])
      .filter(p => p.activo !== false && p.en_carta_qr !== false);
    const categorias = state.categorias || [];

    const groups = {};
    for (const p of productos) {
      const key = p.categoria || '__sin_cat';
      if (!groups[key]) groups[key] = [];
      groups[key].push(p);
    }

    MENU = [];
    for (const cat of categorias) {
      if (groups[cat.id] && groups[cat.id].length) {
        MENU.push({
          label: `${cat.emoji || ''} ${cat.nombre}`.trim(),
          items: groups[cat.id].map(p => ({
            id: p.id,
            emoji: p.emoji || '🍽️',
            foto: p.foto || null,
            nombre: p.nombre,
            desc: p.descripcion || '',
            ...((p.precio_chica || p.precio_mediana || p.precio_grande)
              ? { precios: { Chica: p.precio_chica, Mediana: p.precio_mediana, Grande: p.precio_grande } }
              : { precio: p.precio })
          }))
        });
      }
    }

    // Uncategorized products
    for (const [catId, items] of Object.entries(groups)) {
      if (catId !== '__sin_cat' && !categorias.find(c => c.id === catId)) {
        MENU.push({
          label: catId,
          items: items.map(p => ({
            id: p.id,
            emoji: p.emoji || '🍽️',
            foto: p.foto || null,
            nombre: p.nombre,
            desc: p.descripcion || '',
            ...((p.precio_chica || p.precio_mediana || p.precio_grande)
              ? { precios: { Chica: p.precio_chica, Mediana: p.precio_mediana, Grande: p.precio_grande } }
              : { precio: p.precio })
          }))
        });
      }
    }
    if (groups['__sin_cat'] && groups['__sin_cat'].length) {
      MENU.push({
        label: 'Otros',
        items: groups['__sin_cat'].map(p => ({
          id: p.id,
          emoji: p.emoji || '🍽️',
          foto: p.foto || null,
          nombre: p.nombre,
          desc: p.descripcion || '',
          ...(p.precio_chica
            ? { precios: { Chica: p.precio_chica, Mediana: p.precio_mediana, Grande: p.precio_grande } }
            : { precio: p.precio })
        }))
      });
    }

  } catch(e) {
    MENU = [];
  }
  renderMenu();
}

loadMenu();
</script>
</body>
</html>
