<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="mz-bg" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"  stop-color="#10b981"/>
      <stop offset="48%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#022c22"/>
    </linearGradient>
    <radialGradient id="mz-glow" cx="30%" cy="18%" r="75%">
      <stop offset="0%"  stop-color="#6ee7b7" stop-opacity="0.5"/>
      <stop offset="55%" stop-color="#34d399" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mz-dome" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="72%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#d2f5e6"/>
    </linearGradient>
    <linearGradient id="mz-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="mz-sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="mz-vig" cx="50%" cy="42%" r="78%">
      <stop offset="62%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.32"/>
    </radialGradient>
    <filter id="mz-ds" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#01231b" flood-opacity="0.5"/>
    </filter>
    <clipPath id="mz-sq"><rect width="512" height="512" rx="88"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="url(#mz-bg)"/>
  <rect width="512" height="512" rx="88" fill="url(#mz-glow)"/>

  <!-- Halo behind cloche -->
  <ellipse cx="256" cy="280" rx="190" ry="150" fill="#34d399" opacity="0.20"/>

  <!-- Bow tie -->
  <g filter="url(#mz-ds)">
    <path d="M 184 94 Q 178 90 178 98 L 178 140 Q 178 148 184 144 L 240 124 L 240 114 Z" fill="#ffffff"/>
    <path d="M 328 94 Q 334 90 334 98 L 334 140 Q 334 148 328 144 L 272 124 L 272 114 Z" fill="#ffffff"/>
    <circle cx="256" cy="119" r="16" fill="#ffffff"/>
    <circle cx="256" cy="119" r="7" fill="#064e3b" opacity="0.45"/>
  </g>

  <!-- Cloche group -->
  <g filter="url(#mz-ds)">
    <!-- Dome -->
    <path d="M 116 330 Q 116 214 256 208 Q 396 214 396 330 Z" fill="url(#mz-dome)"/>
    <!-- Gold knob -->
    <rect x="247" y="196" width="18" height="14" rx="6" fill="url(#mz-gold)"/>
    <circle cx="256" cy="188" r="15" fill="url(#mz-gold)"/>
    <circle cx="251" cy="183" r="5" fill="#ffffff" opacity="0.75"/>
    <!-- Plate -->
    <ellipse cx="256" cy="330" rx="162" ry="22" fill="#022c22"/>
    <ellipse cx="256" cy="330" rx="162" ry="22" stroke="#ffffff" stroke-width="14" fill="none"/>
  </g>

  <!-- Dome reflection -->
  <path d="M 150 298 Q 170 248 224 236" stroke="#ffffff" stroke-opacity="0.5" stroke-width="13" stroke-linecap="round" fill="none"/>
  <path d="M 142 318 Q 146 308 154 300" stroke="#ffffff" stroke-opacity="0.3" stroke-width="9" stroke-linecap="round" fill="none"/>

  <!-- Plate under-shadow -->
  <ellipse cx="256" cy="372" rx="148" ry="13" fill="#000000" opacity="0.22"/>

  <!-- Sparkles -->
  <path d="M 330 244 Q 334 257 347 261 Q 334 265 330 278 Q 326 265 313 261 Q 326 257 330 244 Z" fill="#ffffff" opacity="0.92"/>
  <path d="M 130 198 Q 133 208 143 211 Q 133 214 130 224 Q 127 214 117 211 Q 127 208 130 198 Z" fill="#ffffff" opacity="0.55"/>
  <circle cx="392" cy="170" r="4.5" fill="#ffffff" opacity="0.5"/>

  <!-- Glass sheen -->
  <path d="M 0 0 H 512 V 188 Q 256 252 0 188 Z" fill="url(#mz-sheen)" clip-path="url(#mz-sq)"/>

  <!-- Vignette + inner border -->
  <rect width="512" height="512" rx="88" fill="url(#mz-vig)"/>
  <rect x="5" y="5" width="502" height="502" rx="84" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2.5"/>

  <!-- Label -->
  <text x="256" y="492" font-size="33" font-weight="700" text-anchor="middle" fill="#ffffff" fill-opacity="0.66" font-family="Arial, sans-serif" letter-spacing="10">MOZO</text>
</svg>
