<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ResTito">
  <defs>
    <linearGradient id="rmark" x1="48" y1="36" x2="200" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9d6bff"/>
      <stop offset=".55" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="amber" x1="108" y1="58" x2="172" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fcd34d"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- letter R built from solid shapes -->
  <g fill="url(#rmark)">
    <rect x="54" y="40" width="36" height="176" rx="14"/>
    <circle cx="126" cy="90" r="58"/>
    <path d="M116 126 L182 212" stroke="url(#rmark)" stroke-width="36" stroke-linecap="round"/>
  </g>

  <!-- plate (counter of the R) -->
  <circle cx="138" cy="86" r="31" fill="#FBF5EA"/>
  <circle cx="138" cy="86" r="31" stroke="url(#amber)" stroke-width="3.5"/>

  <!-- fork + knife on the plate -->
  <g fill="#6d28d9">
    <!-- fork -->
    <rect x="124.5" y="68" width="2.6" height="13" rx="1.3"/>
    <rect x="129.2" y="68" width="2.6" height="13" rx="1.3"/>
    <rect x="133.9" y="68" width="2.6" height="13" rx="1.3"/>
    <path d="M124 80h11v2a5.5 5.5 0 0 1-5.5 5.5h0A5.5 5.5 0 0 1 124 82z"/>
    <rect x="127.5" y="87" width="4" height="20" rx="2"/>
    <!-- knife -->
    <path d="M150 68c2.4 9 1.8 18 1.8 24h-5.6c0-6-.6-15 1.8-24 .5-2 1.5-2 2 0z"/>
    <rect x="146.5" y="91" width="4.6" height="16" rx="2.3"/>
  </g>
  <path d="M145.6 70c-1.8 9-1.6 16-1.6 22" stroke="url(#amber)" stroke-width="2.2" stroke-linecap="round" fill="none" opacity=".9"/>
</svg>
