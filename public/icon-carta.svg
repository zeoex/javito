  <!-- Line 5 -->
  <rect x="204" y="292" width="104" height="10" rx="5" fill="rgba(255,255,255,0.85)"/>
  <!-- Line 6 -->
  <rect x="204" y="316" width="88" height="8" rx="4" fill="rgba(255,255,255,0.55)"/>

  <!-- Cart badge (bottom right) -->
  <circle cx="364" cy="358" r="58" fill="rgba(0,0,0,0.28)"/>
  <circle cx="364" cy="358" r="50" fill="url(#bg)" stroke="rgba(255,255,255,0.4)" stroke-width="4"/>
  <!-- Cart icon -->
