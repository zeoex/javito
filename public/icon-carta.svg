  <!-- Phone notch -->
  <rect x="228" y="118" width="56" height="10" rx="5" fill="rgba(255,255,255,0.45)"/>
  <!-- Phone home bar -->
  <rect x="228" y="412" width="56" height="8" rx="4" fill="rgba(255,255,255,0.45)"/>

  <!-- Menu lines on screen -->
  <!-- Line 1 with fork icon -->
  <rect x="204" y="172" width="104" height="10" rx="5" fill="rgba(255,255,255,0.85)"/>
  <!-- Line 2 -->
  <rect x="204" y="196" width="80" height="8" rx="4" fill="rgba(255,255,255,0.55)"/>
  <!-- Divider -->
  <line x1="192" y1="218" x2="320" y2="218" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <!-- Line 3 -->
  <rect x="204" y="232" width="104" height="10" rx="5" fill="rgba(255,255,255,0.85)"/>
  <!-- Line 4 -->
  <rect x="204" y="256" width="68" height="8" rx="4" fill="rgba(255,255,255,0.55)"/>
  <!-- Divider -->
