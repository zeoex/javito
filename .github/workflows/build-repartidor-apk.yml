name: Build Repartidor APK

on:
  workflow_dispatch:
  push:
    paths:
      - "mobile/**"
      - ".github/workflows/build-repartidor-apk.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Patch AndroidManifest (permisos de ubicación)
        run: node scripts/patch-android.mjs

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk restito-repartidor.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: restito-repartidor-apk
          path: mobile/restito-repartidor.apk

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-repartidor
          name: ResTito Repartidor (APK)
          make_latest: true
          files: mobile/restito-repartidor.apk
