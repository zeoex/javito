name: Build Repartidor APK

on:
  workflow_dispatch:
    inputs:
      local:
        description: "Slug del local (ej: la-isla)"
        required: true
        default: "la-isla"
  push:
    paths:
      - "mobile/**"
      - ".github/workflows/build-repartidor-apk.yml"

permissions:
  contents: write

env:
  LOCAL: ${{ github.event.inputs.local || 'la-isla' }}
  ORIGIN: https://restito-production.up.railway.app

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Preparar local (nombre, logo, appId)
        run: node scripts/prepare-local.mjs

      - name: Generar íconos desde el logo
        run: node scripts/make-icons.mjs

      - name: Add Android platform
        run: npx cap add android

      - name: Patch AndroidManifest (permisos de ubicación)
        run: node scripts/patch-android.mjs

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Aplicar íconos (mipmaps + adaptativos)
        run: npx capacitor-assets generate --android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk "restito-${LOCAL}.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: restito-${{ env.LOCAL }}-apk
          path: mobile/restito-${{ env.LOCAL }}.apk

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-repartidor
          name: ResTito Repartidor (APKs por local)
          make_latest: true
          files: mobile/restito-${{ env.LOCAL }}.apk
